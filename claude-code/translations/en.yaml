configuration:
  anthropic_api_key:
    name: Anthropic API Key
    description: >-
      Your Anthropic API key. Leave blank to use OAuth authentication.
  system_prompt:
    name: System Prompt
    description: >-
      Additional system prompt appended to every new Claude session.
  dangerously_skip_permissions:
    name: Skip Permission Prompts
    description: >-
      Bypass all permission checks. Only enable in trusted environments.
  auth_keepalive_hours:
    name: Auth Keepalive Interval (hours)
    description: >-
      How often to check and refresh OAuth tokens in the background.
      Set to 0 to disable. Only applies when using OAuth, not API keys.
      Default: 4 hours.
