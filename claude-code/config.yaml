name: Claude Code
description: Claude CLI terminal accessible from the Home Assistant sidebar
version: 1.3.100
slug: claude-code
url: https://github.com/martinsaul/claudehacs
startup: application
boot: auto
init: false
ingress: true
ingress_port: 7681
ingress_stream: true
panel_icon: mdi:robot
panel_title: Claude
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: false
full_access: false
arch:
  - amd64
  - aarch64
map:
  - config:rw
  - ssl:ro
  - media:rw
  - share:rw
options:
  anthropic_api_key: ""
  dangerously_skip_permissions: false
schema:
  anthropic_api_key: str?
  dangerously_skip_permissions: bool
environment:
  PYTHONDONTWRITEBYTECODE: "1"
