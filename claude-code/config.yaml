name: Claude Code
description: Claude Code chat interface accessible from the Home Assistant sidebar
version: 2.0.2
slug: claude-code
url: https://github.com/martinsaul/claudehacs
startup: application
boot: auto
init: false
ingress: true
ingress_port: 7681
panel_icon: mdi:robot
panel_title: Claude
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: false
full_access: false
arch:
  - amd64
  - aarch64
map:
  - config:rw
  - ssl:ro
  - media:rw
  - share:rw
options:
  anthropic_api_key: ""
  system_prompt: ""
  dangerously_skip_permissions: false
  auth_keepalive_hours: 4
schema:
  anthropic_api_key: str?
  system_prompt: str?
  dangerously_skip_permissions: bool
  auth_keepalive_hours: "int(0,7)?"
environment:
  PYTHONDONTWRITEBYTECODE: "1"
